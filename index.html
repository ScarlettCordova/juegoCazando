<!DOCTYPE html>
<html>
<head>
  <title>Juego Cazando</title>
  <link rel="stylesheet" href="cazando.css"/>
  <script src="utils.js"></script>
</head>

<body onload="iniciarJuego()">

  <h1>🎮 JUEGO CAZANDO 🎮</h1>
  <p class="autor">Autor: Scarlett Córdova</p>

  <canvas id="areaJuego" width="500" height="500"></canvas>

  <div class="controles">
    <button onclick="moverArriba()">⬆</button>
    <br>
    <button onclick="moverIzquierda()">⬅</button>
    <button onclick="moverAbajo()">⬇</button>
    <button onclick="moverDerecha()">➡</button>
    <br>
    <button onclick="reiniciar()">REINICIAR</button>
  </div>

  <div class="panel">
    <span>PUNTOS: <span id="puntos">0</span></span>
    <span>TIEMPO: <span id="tiempo">15</span></span>
  </div>

  <p id="mensaje"></p>

  <script src="cazando.js"></script>
</body>
</html>
